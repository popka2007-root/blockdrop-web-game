<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Тетрис" />
    <meta name="theme-color" content="#182033" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Тетрис</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/styles/pvp-enhancements.css" />
  </head>
  <body>
    <main class="app" id="app">
      <section class="topbar" id="topbar">
        <div class="stat">
          <div class="stat-label">Счёт</div>
          <div class="stat-value" id="scoreValue">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Уровень</div>
          <div class="stat-value" id="levelValue">1</div>
        </div>
        <div class="stat">
          <div class="stat-label">Линии</div>
          <div class="stat-value" id="linesValue">0</div>
        </div>
        <button class="icon-button" id="pauseButton" aria-label="Пауза">
          II
        </button>
      </section>

      <section class="status-strip" id="statusStrip">
        <div class="status-card">
          <span>Цель</span>
          <b id="goalValue">Выжить</b>
          <div class="progress"><i id="progressFill"></i></div>
        </div>
        <div class="status-card">
          <span>Ранг</span><b id="rankValue">Новичок</b>
        </div>
      </section>

      <section class="game-layout" id="gameLayout">
        <div class="board-shell" id="boardShell">
          <div class="danger-band"></div>
          <canvas id="board" width="320" height="640"></canvas>
        </div>

        <aside class="side" id="sidePanel">
          <div class="panel" id="nextPanel">
            <div class="panel-title">Дальше</div>
            <canvas class="preview" id="next1" width="76" height="76"></canvas>
            <canvas class="preview" id="next2" width="58" height="58"></canvas>
            <canvas class="preview" id="next3" width="58" height="58"></canvas>
          </div>

          <div class="panel" id="holdPanel">
            <div class="panel-title">Запас</div>
            <canvas class="preview" id="hold" width="76" height="76"></canvas>
          </div>

          <div class="panel tiny-grid" id="statsPanel">
            <div class="mini-stat">
              <b id="recordValue">0</b><span>Рекорд</span>
            </div>
            <div class="mini-stat">
              <b id="comboValue">0</b><span>Комбо/стрик</span>
            </div>
            <div class="mini-stat">
              <b id="piecesValue">0</b><span>Фигур</span>
            </div>
            <div class="mini-stat">
              <b id="timeValue">0:00</b><span>Время</span>
            </div>
            <div class="mini-stat hidden">
              <b id="apmValue">0</b><span>APM</span>
            </div>
            <div class="mini-stat hidden">
              <b id="heightValue">0</b><span>Высота</span>
            </div>
          </div>

          <div class="online-panel" id="onlinePanel"></div>
        </aside>
      </section>

      <section class="controls" id="controls">
        <div class="controls-row control-buttons">
          <button class="button" id="leftButton">←</button>
          <button class="button" id="rotateButton">Поворот</button>
          <button class="button" id="rightButton">→</button>
        </div>
        <div class="controls-row bottom control-buttons">
          <button class="button" id="downButton">Вниз</button>
          <button class="button" id="dropButton">Сброс</button>
        </div>
        <div class="controls-row mobile-main">
          <button class="button warn" id="holdButton">Запас</button>
          <button class="button" id="mainMenuButton">Меню</button>
        </div>
      </section>
    </main>

    <!-- overlays unchanged -->

    <div class="fx-layer" id="fxLayer"></div>
    <div class="toast" id="toast"></div>

    <script type="module" src="/js/game.js"></script>
    <script type="module" src="/js/pvp-enhancements.js"></script>
  </body>
</html>
